name: Build and Push Nginx Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      nginx_version:
        description: "Nginx source version to build"
        required: false
        default: "1.26.3"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_IMAGE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract Docker Hub metadata
        id: meta-dockerhub
        if: env.DOCKERHUB_IMAGE != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Show image targets
        run: |
          echo "GHCR image: $REGISTRY/$IMAGE_NAME"
          if [ -n "$DOCKERHUB_IMAGE" ]; then
            echo "Docker Hub image: $DOCKERHUB_IMAGE"
          else
            echo "Docker Hub image: not configured"
          fi
          echo "Tags:"
          printf '%s\n' "${{ steps.meta-ghcr.outputs.tags }}"
          printf '%s\n' "${{ steps.meta-dockerhub.outputs.tags }}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            NGINX_VERSION=${{ github.event.inputs.nginx_version || '1.26.3' }}
            GEOIP_REQUIRED=true
          secrets: |
            mm_account_id=${{ secrets.MAXMIND_ACCOUNT_ID }}
            mm_license_key=${{ secrets.MAXMIND_LICENSE_KEY }}
          no-cache-filters: geoip
          cache-from: type=gha
          cache-to: type=gha,mode=max
