name: Build and Push Nginx Image to OCIR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      nginx_version:
        description: "Nginx source version to build"
        required: false
        default: "1.26.3"

env:
  OCIR_REGISTRY: dxb.ocir.io
  OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE || 'axri7n8wrh6j' }}
  OCIR_REPOSITORY: ${{ vars.OCIR_REPOSITORY || 'nginx' }}

jobs:
  build-and-push-ocir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate OCIR configuration
        env:
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
          OCIR_AUTH_TOKEN: ${{ secrets.OCIR_AUTH_TOKEN }}
        run: |
          test -n "$OCIR_NAMESPACE"
          test -n "$OCIR_USERNAME"
          test -n "$OCIR_AUTH_TOKEN"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract OCIR metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.OCIR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to OCIR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NGINX_VERSION=${{ inputs.nginx_version || '1.26.3' }}
            GEOIP_REQUIRED=true
          secrets: |
            mm_account_id=${{ secrets.MAXMIND_ACCOUNT_ID }}
            mm_license_key=${{ secrets.MAXMIND_LICENSE_KEY }}
          no-cache-filters: geoip
          cache-from: type=gha,scope=ocir
          cache-to: type=gha,mode=max,scope=ocir
