<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nginx Custom</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #18212f;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(24, 33, 47, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      font-weight: 700;
    }

    p {
      margin: 0;
      color: #526072;
      line-height: 1.6;
    }

    code {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #edf2f7;
      color: #0f172a;
      font-size: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #121821;
        color: #eef3f8;
      }

      main {
        border-color: #293445;
        background: #18212f;
        box-shadow: none;
      }

      p {
        color: #bac6d4;
      }

      code {
        background: #233044;
        color: #f8fafc;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Nginx Custom is running</h1>
    <p>服务器 IP：</p>
    <code><!--# echo var="server_addr" default="unknown" --></code>
  </main>
</body>
</html>
